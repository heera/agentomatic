name: PHP compatibility

# Keeps the plugin runnable on its declared floor (PHP 7.4) — see the
# "Requires PHP" header in heera-agent-discovery.php. Two layers:
#   1. `php -l` across 7.4 → 8.3, which catches any syntax a version can't parse
#      (match, enums, nullsafe, constructor promotion, named args, …).
#   2. PHPCompatibilityWP, which catches *API* usage newer than 7.4 (e.g.
#      str_contains) while knowing which of those WordPress core polyfills.

on:
  push:
    branches: [ main ]
  pull_request:

concurrency:
  group: php-compat-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint · PHP ${{ matrix.php }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: [ '7.4', '8.0', '8.2', '8.3' ]
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none

      - name: php -l (all shipped PHP, excluding vendor)
        run: |
          find . -path ./vendor -prune -o -name '*.php' -print0 \
            | xargs -0 -n1 -P4 php -l

  phpcompat:
    name: PHPCompatibility · 7.4+
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '7.4'
          coverage: none
          tools: composer

      - name: Install PHPCS + PHPCompatibilityWP
        run: |
          composer global config allow-plugins.dealerdirect/phpcodesniffer-composer-installer true
          composer global require --no-interaction --no-progress \
            "squizlabs/php_codesniffer:^3.9" \
            "phpcompatibility/phpcompatibility-wp:^2.1" \
            "dealerdirect/phpcodesniffer-composer-installer:^1.0"
          echo "$(composer global config bin-dir --absolute)" >> "$GITHUB_PATH"

      - name: Check 7.4+ compatibility (our code only)
        # Fail the build on real incompatibilities (errors) but not on advisory
        # warnings (e.g. the "resource" soft-reserved-keyword notice), which are
        # informational and don't break PHP 7.4.
        run: |
          phpcs -p --colors \
            --standard=PHPCompatibilityWP \
            --runtime-set testVersion 7.4- \
            --runtime-set ignore_warnings_on_exit 1 \
            --extensions=php \
            --ignore="*/vendor/*,*/node_modules/*" \
            inc/ heera-agent-discovery.php
