<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="file:///Volumes/Projects/wpftest/wp-content/plugins/agentimus/assets/admin/app.css">
<style>
  /* Approximate the wp-admin content context the app is styled against. */
  html, body { margin: 0; padding: 0; background: #f0f0f1; -webkit-font-smoothing: antialiased; }
  #wpwrap { background: #f0f0f1; }
  #wpcontent { padding-left: 20px; box-sizing: border-box; }
  .wrap { margin: 10px 20px 0 2px; }
</style>
<script src="file:///Users/alpha/Desktop/agentimus-wporg/_build/data.js"></script>
<script>
  // The admin app fetches a few REST endpoints at runtime; serve canned data so a
  // static render looks alive (only /activity is hit on initial load — Dashboard).
  (function () {
    window.fetch = function (u) {
      u = String(u);
      var body = '{}';
      if (u.indexOf('/activity') > -1) body = JSON.stringify(window.__ACTIVITY__ || {});
      return Promise.resolve(new Response(body, { status: 200, headers: { 'Content-Type': 'application/json' } }));
    };
  })();
</script>
</head>
<body class="wp-admin">
  <div id="wpwrap"><div id="wpcontent">
    <div class="wrap"><div id="agentimus-app"></div></div>
  </div></div>
  <script src="file:///Volumes/Projects/wpftest/wp-content/plugins/agentimus/assets/admin/app.js"></script>
</body>
</html>
